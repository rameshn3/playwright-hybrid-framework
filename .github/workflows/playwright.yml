name: Playwright Framework

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:

  ui-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure Commandline
        run: npm install -g allure-commandline

      - name: Clean old reports
        run: |
          rm -rf allure-results
          rm -rf allure-report-ui

      - name: Run SauceDemo Tests
        run: npm run test:ui

      - name: Generate UI Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report-ui

      - name: Upload UI Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playwright-report
          path: playwright-report/

      - name: Upload UI Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-report
          path: allure-report-ui/

      - name: Deploy UI Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report-ui
          destination_dir: ui

  api-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure Commandline
        run: npm install -g allure-commandline

      - name: Clean old reports
        run: |
          rm -rf allure-results
          rm -rf allure-report-api

      - name: Run Booking API Tests
        run: npm run test:api

      - name: Generate API Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report-api

      - name: Upload API Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-playwright-report
          path: playwright-report/

      - name: Upload API Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report
          path: allure-report-api/

      - name: Deploy API Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report-api
          destination_dir: api

  heroku-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure Commandline
        run: npm install -g allure-commandline

      - name: Clean old reports
        run: |
          rm -rf allure-results
          rm -rf allure-report-heroku

      - name: Run HerokuApp Tests
        run: npm run test:heroku

      - name: Generate Heroku Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report-heroku

      - name: Upload Heroku Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heroku-playwright-report
          path: playwright-report/

      - name: Upload Heroku Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heroku-allure-report
          path: allure-report-heroku/

      - name: Deploy Heroku Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report-heroku
          destination_dir: heroku