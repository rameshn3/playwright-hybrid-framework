name: Playwright Framework

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  ui-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure Commandline
        run: npm install -g allure-commandline

      - name: Run SauceDemo Tests
        run: npm run test:ui

      - name: Generate UI Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload UI Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playwright-report
          path: playwright-report/

      - name: Upload UI Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-report
          path: allure-report/

  api-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure Commandline
        run: npm install -g allure-commandline

      - name: Run Booking API Tests
        run: npm run test:api

      - name: Generate API Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload API Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-playwright-report
          path: playwright-report/

      - name: Upload API Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report
          path: allure-report/

  heroku-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure Commandline
        run: npm install -g allure-commandline

      - name: Run HerokuApp Tests
        run: npm run test:heroku

      - name: Generate Heroku Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Heroku Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heroku-playwright-report
          path: playwright-report/

      - name: Upload Heroku Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heroku-allure-report
          path: allure-report/